<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine</title>

    <!-- css file -->
    <link rel="stylesheet" href="./style.css">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <!-- saira stencil font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Image title -->
    <h1 class="text-center pt-5 fw-bolder">Image Search Engine</h1>

    <!-- main container -->
    <div class="d-flex justify-content-center align-items-center img-container">
        <!-- serch filed -->
        <input type="text" placeholder="Search Anything Here...">

        <!-- search button -->
        <button>Search</button>
    </div>

    <!-- img result container -->
    <div id="img-container"></div>

    <!-- show more button -->
     <button id="showMore-btn">Show More</button>


    <!-- js file -->
    <script src="./script.js"></script>
</body>
</html>
